{% extends "base_logado.html" %}

{% block title %}Painel Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="text-center w-100">
                <h2 class="fw-bold">Painel Administrador</h2>
                <p class="text-muted">Você tem <span id="qtd_usuarios" class="badge bg-primary">{{ list_usuarios | length }} Usuários</span> no sistema hoje.</p>
            </div>
        </div>

        <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Nome</th>
                        <th>E-mail</th>
                        <th class="text-center">Tarefas Ativas</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela_usuarios">
                    <tr>
                        <td colspan="4" class="text-center">Carregando usuários...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    </div>
</div>
<script>
    async function carregarUsuarios() {
        const tbody        = document.getElementById('tabela_usuarios');
        const qtd_usuarios = document.getElementById('qtd_usuarios');

        // Defina seus parâmetros aqui
        const params = new URLSearchParams({
            id_usuario: {{ id_usuario }},
            lista_adm : false
        });

        try {
            const response = await fetch(`/users?${params.toString()}`);
            if (!response.ok) throw new Error('Falha ao buscar dados');

            const usuarios         = await response.json();
            tbody.innerHTML        = '';
            qtd_usuarios.innerHTML = usuarios.length + ' Usuários';

            if (usuarios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">Nenhum usuário encontrado.</td></tr>';
                return;
            }

            usuarios.forEach(usuario => {
                const badgeClass = usuario.total_tarefas > 0 ? 'bg-success' : 'bg-secondary';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="align-middle ps-4">${usuario.nome}</td>
                    <td class="text-muted align-middle">${usuario.email}</td>
                    <td class="text-center align-middle">
                        <span class="badge rounded-pill ${badgeClass}">
                            ${usuario.total_tarefas}
                        </span>
                    </td>
                    <td class="text-center align-middle">
                        <a href="/admin/usuario/${usuario.id}" class="btn btn-sm btn-outline-primary">
                            Ver Detalhes
                        </a>
                    </td>
                `;
                tbody.appendChild(tr);
            });

        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Erro ao carregar dados.</td></tr>';
        }
    }

    document.addEventListener('DOMContentLoaded', carregarUsuarios);
</script>
{% endblock %}
