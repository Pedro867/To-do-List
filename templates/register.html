{% extends 'base.html' %}

{% block title %}Cadastro - Meu Projeto{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="text-center mb-3">Criar Conta</h2>
                <p class="text-muted text-center mb-3">Preencha os dados abaixo para começar.</p>

                {% if msg %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}

                <form action="/register" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: João Silva" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" value="{{ email if email else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="senha" name="senha" value="{{ senha if senha else '' }}" required>
                            <button class="btn btn-outline-secondary" type="button" id="btn-senha">
                                <i class="bi bi-eye" id="icone-olho"></i>
                            </button>
                        </div>
                        <div class="form-text">Mínimo de 6 caracteres.</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmar_senha" class="form-label">Confirmar Senha</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmar_senha" name="confirmar_senha" required>
                            <button class="btn btn-outline-secondary" type="button" id="btn-senha-confirmar">
                                <i class="bi bi-eye" id="icone-olho"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-success">Finalizar Cadastro</button>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <p class="mb-0">Já tem uma conta? <a href="/login" class="text-decoration-none">Faça login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const btnSenha            = document.querySelector('#btn-senha');
    const btnSenhaConfirmar   = document.querySelector('#btn-senha-confirmar');
    const inputSenha          = document.querySelector('#senha');
    const inputSenhaConfirmar = document.querySelector('#confirmar_senha');
    const iconeOlho           = document.querySelector('#icone-olho');

    btnSenha.addEventListener('click', () => {
        const type = inputSenha.getAttribute('type') === 'password' ? 'text' : 'password';
        inputSenha.setAttribute('type', type);
        iconeOlho.classList.toggle('bi-eye');
        iconeOlho.classList.toggle('bi-eye-slash');
    });

    btnSenhaConfirmar.addEventListener('click', () => {
        const type = inputSenhaConfirmar.getAttribute('type') === 'password' ? 'text' : 'password';
        inputSenhaConfirmar.setAttribute('type', type);
        iconeOlho.classList.toggle('bi-eye');
        iconeOlho.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
