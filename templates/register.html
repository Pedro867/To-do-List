{% extends 'base.html' %}

{% block title %}Cadastro - Meu Projeto{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="text-center mb-3">Criar Conta</h2>
                <p class="text-muted text-center mb-3">Preencha os dados abaixo para começar.</p>
                
                <form action="/register" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Ex: João Silva" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" minlength="6" required>
                        <div class="form-text">Mínimo de 6 caracteres.</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmar_senha" class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-control" id="confirmar_senha" name="confirmar_senha" required>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-success">Finalizar Cadastro</button>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <p class="mb-0">Já tem uma conta? <a href="/login" class="text-decoration-none">Faça login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
